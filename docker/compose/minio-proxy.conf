worker_processes auto;
events { worker_connections 1024; }

http {
    access_log off;

    server {
        listen 9000;

        # Let large object uploads stream straight through untouched.
        client_max_body_size 0;
        ignore_invalid_headers off;
        proxy_buffering off;
        proxy_request_buffering off;

        # Resolve the MinIO container name at runtime via Docker's DNS so the
        # proxy keeps working if MinIO is recreated with a new IP.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $minio_backend "minio:9000";

        location / {
            proxy_pass http://$minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WHY THIS PROXY EXISTS:
            # The MinIO .NET SDK bundled in the upstream mytelegram-file-server image
            # (Minio 6.0.6-local, commit 0b39839) has a regression: when MinIO answers
            # a byte-range request with "416 Range Not Satisfiable" (no body) it runs
            # ParseWellKnownErrorNoContent, which does not handle 416, leaves the error
            # object null, and then `throw error;` becomes a NullReferenceException.
            # Telegram clients issue such an out-of-range request for the final chunk of
            # a download (offset at/after EOF), so the file-server log gets spammed with
            # NullReferenceException and those tail requests fail.
            # We can't rebuild file-server here (it is published separately), so we
            # neutralise the 416 at the proxy: turn it into a clean empty 200 that the
            # SDK handles without crashing. Only 416 responses are rewritten; everything
            # else (200/206/normal errors) passes through unchanged.
            proxy_intercept_errors on;
            error_page 416 = @range_not_satisfiable;
        }

        location @range_not_satisfiable {
            internal;
            add_header Accept-Ranges bytes always;
            return 200 "";
        }
    }
}
