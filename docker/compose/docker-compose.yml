networks:
  tg-net:
    driver: bridge

services:
  ### Redis
  redis:
    image: redis:8-alpine
    restart: always
    networks:
      - tg-net
    #ports:
    #- "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    # Optional auth:
    # command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--requirepass", "${REDIS_PASSWORD}"]
    # environment:
    #   REDIS_PASSWORD: ${Redis__Password:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ### RabbitMq
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - tg-net
    #ports:
    #  - "5672:5672"
    #  - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMQ__Connections__Default__UserName:-test}
      RABBITMQ_DEFAULT_PASS: ${RabbitMQ__Connections__Default__Password}
      RABBITMQ_ERLANG_COOKIE: ${RabbitMQ__ErlangCookie:-changeme-cookie}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ### MongoDb
  mongodb:
    image: mongo:8
    restart: always
    networks:
      - tg-net
    #ports:
    #  - "27017:27017"
    command: ["mongod", "--quiet", "--logpath", "/dev/null", "--logappend"]
    volumes:
      - ./data/mongo/db:/data/db
      - ./data/mongo/configdb:/data/configdb
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: ${Mongo__User:-root}
    #   MONGO_INITDB_ROOT_PASSWORD: ${Mongo__Password:-rootpass}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  ### Minio
  minio:
    image: minio/minio:latest
    restart: always
    networks:
      - tg-net

    #ports:
    #  - 9000:9000
    #  - 9001:9001
    environment:
      MINIO_ROOT_USER: ${Minio__AccessKey}
      MINIO_ROOT_PASSWORD: ${Minio__SecretKey}
    volumes:
      - ./data/minio:/data
      #- /docker/minio/config:/root/./minio/
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  ### MinIO proxy (neutralises 416 Range-Not-Satisfiable for the file-server SDK)
  # The upstream file-server bundles a MinIO .NET SDK that throws
  # NullReferenceException on 416 responses (byte-range requests past EOF, i.e. the
  # last chunk of a download). This tiny nginx proxy rewrites those 416s into a clean
  # empty 200 so the SDK stops crashing. All other traffic passes through untouched.
  minio-proxy:
    image: nginx:alpine
    restart: always
    networks:
      - tg-net
    volumes:
      - ./minio-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio:
        condition: service_healthy

  ### Coturn (STUN/TURN server for WebRTC calls)
  coturn:
    image: coturn/coturn:latest
    restart: always
    networks:
      - tg-net
    ports:
      - "${PORT_STUN:-5348}:${PORT_STUN:-5348}"
      - "${PORT_STUN:-5348}:${PORT_STUN:-5348}/udp"
      - "${PORT_RELAY_MIN:-49152}-${PORT_RELAY_MAX:-49172}:${PORT_RELAY_MIN:-49152}-${PORT_RELAY_MAX:-49172}/udp"
    volumes:
      - ./data/coturn:/var/lib/coturn
    command: >
      --verbose
      --listening-ip=0.0.0.0
      --relay-ip=0.0.0.0
      --external-ip=${COTURN_EXTERNAL_IP:-${App__WebRtcConnections__0__Ip:-127.0.0.1}}
      --realm=testgram
      --server-name=testgram
      --listening-port=${PORT_STUN:-5348}
      --min-port=${PORT_RELAY_MIN:-49152}
      --max-port=${PORT_RELAY_MAX:-49172}
      --fingerprint
      --lt-cred-mech
      --no-tls
      --no-dtls
      --user=${App__WebRtcConnections__0__UserName:-testgram}:${App__WebRtcConnections__0__Password:-testgram2024}
      --log-file=stdout

  ### RTMP server for group calls and live stories
  rtmp-server:
    image: bluenviron/mediamtx:latest
    restart: always
    networks:
      - tg-net
    ports:
      - "${RTMP_PORT:-1935}:1935"
      - "${RTMP_HLS_PORT:-8888}:8888"
    volumes:
      - ./data/rtmp:/recordings


  ################### MyTelegram server

  ### Call system init (setup indexes)
  call-init:
    image: mongo:8
    networks:
      - tg-net
    environment:
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      App__DatabaseName: ${App__DatabaseName}
    volumes:
      - ./init-calls.sh:/init-calls.sh:ro
    command: ["/bin/bash", "/init-calls.sh"]
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  business-init:
    image: mongo:8
    networks:
      - tg-net
    volumes:
      - ./init-business.sh:/init-business.sh:ro
    command: ["/bin/bash", "/init-business.sh"]
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  botfather-init:
    image: mongo:8
    networks:
      - tg-net
    volumes:
      - ./init-botfather.sh:/init-botfather.sh:ro
    command: ["/bin/bash", "/init-botfather.sh"]
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  telegram-service-init:
    image: mongo:8
    networks:
      - tg-net
    volumes:
      - ./init-telegram-service.sh:/init-telegram-service.sh:ro
    command: ["/bin/bash", "/init-telegram-service.sh"]
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

### Data seeder
  data-seeder:
    image: ${TestgramRegistry}/mytelegram-data-seeder:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    environment:
      Serilog__MinimumLevel__Default: ${Serilog__MinimumLevel__Default}
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      App__Brand: ${App__Brand:-Testgram}
      App__DatabaseName: ${App__DatabaseName}
      App__ReadModelDatabaseName: ${App__ReadModelDatabaseName}
      App__CreateTestUsers: ${App__CreateTestUsers}
      App__ProtectedUsernames__0: ${App__ProtectedUsernames__0:-admin}
      App__ProtectedUsernames__1: ${App__ProtectedUsernames__1:-botfather}
      App__ProtectedUsernames__2: ${App__ProtectedUsernames__2:-support}
      App__ProtectedUsernames__3: ${App__ProtectedUsernames__3:-telegram}
      # App__LoadAllStickersIntoMemory: ${App__LoadAllStickersIntoMemory}
      RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName:-rabbitmq}
      RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port:-5672}
      RabbitMQ__Connections__Default__UserName: ${RabbitMQ__Connections__Default__UserName:-test}
      RabbitMQ__Connections__Default__Password: ${RabbitMQ__Connections__Default__Password}
      #RabbitMQ__EventBus__ClientName: ${RabbitMQ__EventBus__ClientName}
      RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
    volumes:
      - ./data/mytelegram/data-seeder/logs:/app/Logs
      - ./data/mytelegram/data-seeder/downloads:/app/downloads
    depends_on:
      mongodb:
        condition: service_healthy
      botfather-init:
        condition: service_completed_successfully
      telegram-service-init:
        condition: service_completed_successfully

  ### 1.Gateway server
  gateway-server:
    image: ${TestgramRegistry}/mytelegram-gateway-server:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    # MTProto DC ports only on the host. HTTPS gateway (30443) is published via
    # docker-compose.override.yml when passkey (WebAuthn) is enabled at install.
    # HTTP/WS gateway (30444) is never published — familygram-web proxies /apiws on tg-net.
    ports:
      - "${App__Servers__0__Port}:${App__Servers__0__Port}"
      - "${App__Servers__1__Port}:${App__Servers__1__Port}"
      - "${App__Servers__2__Port}:${App__Servers__2__Port}"
      - "${App__Servers__3__Port}:${App__Servers__3__Port}"
    volumes:
      - ./data/mytelegram/gateway/logs:/app/Logs
    environment:
      Serilog__MinimumLevel__Default: Debug
      # App__ThisDcId: ${App__ThisDcId}
      # App__MediaOnly: ${App__MediaOnly}
      App__Servers__0__Enabled: ${App__Servers__0__Enabled:-True}
      # App__Servers__0__ServerType: ${App__Servers__0__ServerType}
      # App__Servers__0__Ip: ${App__Servers__0__Ip}
      # App__Servers__0__Ipv6: ${App__Servers__0__Ipv6}
      App__Servers__0__Port: ${App__Servers__0__Port}
      # App__Servers__0__Ssl: ${App__Servers__0__Ssl}
      # App__Servers__0__CertPemFilePath: ${App__Servers__0__CertPemFilePath}
      # App__Servers__0__KeyPemFilePath: ${App__Servers__0__KeyPemFilePath}
      # App__Servers__0__EnableProxyProtocolV2: ${App__Servers__0__EnableProxyProtocolV2}
      # App__Servers__0__MediaOnly: ${App__Servers__0__MediaOnly}
      App__Servers__1__Enabled: ${App__Servers__1__Enabled}
      # App__Servers__1__ServerType: ${App__Servers__1__ServerType}
      # App__Servers__1__Ip: ${App__Servers__1__Ip}
      # App__Servers__1__Ipv6: ${App__Servers__1__Ipv6}
      App__Servers__1__Port: ${App__Servers__1__Port}
      # App__Servers__1__Ssl: ${App__Servers__1__Ssl}
      # App__Servers__1__CertPemFilePath: ${App__Servers__1__CertPemFilePath}
      # App__Servers__1__KeyPemFilePath: ${App__Servers__1__KeyPemFilePath}
      # App__Servers__1__EnableProxyProtocolV2: ${App__Servers__1__EnableProxyProtocolV2}
      # App__Servers__1__MediaOnly: ${App__Servers__1__MediaOnly}
      App__Servers__2__Enabled: ${App__Servers__2__Enabled}
      # App__Servers__2__ServerType: ${App__Servers__2__ServerType}
      # App__Servers__2__Ip: ${App__Servers__2__Ip}
      # App__Servers__2__Ipv6: ${App__Servers__2__Ipv6}
      App__Servers__2__Port: ${App__Servers__2__Port}
      # App__Servers__2__Ssl: ${App__Servers__2__Ssl}
      # App__Servers__2__CertPemFilePath: ${App__Servers__2__CertPemFilePath}
      # App__Servers__2__KeyPemFilePath: ${App__Servers__2__KeyPemFilePath}
      # App__Servers__2__EnableProxyProtocolV2: ${App__Servers__2__EnableProxyProtocolV2}
      App__Servers__2__MediaOnly: "False"
      App__Servers__3__Enabled: ${App__Servers__3__Enabled}
      # App__Servers__3__ServerType: ${App__Servers__3__ServerType}
      # App__Servers__3__Ip: ${App__Servers__3__Ip}
      # App__Servers__3__Ipv6: ${App__Servers__3__Ipv6}
      App__Servers__3__Port: ${App__Servers__3__Port}
      # App__Servers__3__Ssl: ${App__Servers__3__Ssl}
      # App__Servers__3__CertPemFilePath: ${App__Servers__3__CertPemFilePath}
      # App__Servers__3__KeyPemFilePath: ${App__Servers__3__KeyPemFilePath}
      # App__Servers__3__EnableProxyProtocolV2: ${App__Servers__3__EnableProxyProtocolV2}
      App__Servers__3__MediaOnly: "False"
      App__Servers__4__Enabled: ${App__Servers__4__Enabled}
      # App__Servers__4__ServerType: ${App__Servers__4__ServerType}
      # App__Servers__4__Ip: ${App__Servers__4__Ip}
      # App__Servers__4__Ipv6: ${App__Servers__4__Ipv6}
      App__Servers__4__Port: ${App__Servers__4__Port}
      # App__Servers__4__Ssl: ${App__Servers__4__Ssl}
      # App__Servers__4__CertPemFilePath: ${App__Servers__4__CertPemFilePath}
      # App__Servers__4__KeyPemFilePath: ${App__Servers__4__KeyPemFilePath}
      # App__Servers__4__EnableProxyProtocolV2: ${App__Servers__4__EnableProxyProtocolV2}
      # App__Servers__4__MediaOnly: ${App__Servers__4__MediaOnly}
      App__Servers__5__Enabled: ${App__Servers__5__Enabled}
      # App__Servers__5__ServerType: ${App__Servers__5__ServerType}
      # App__Servers__5__Ip: ${App__Servers__5__Ip}
      # App__Servers__5__Ipv6: ${App__Servers__5__Ipv6}
      App__Servers__5__Port: ${App__Servers__5__Port}
      # App__Servers__5__Ssl: ${App__Servers__5__Ssl}
      # App__Servers__5__CertPemFilePath: ${App__Servers__5__CertPemFilePath}
      # App__Servers__5__KeyPemFilePath: ${App__Servers__5__KeyPemFilePath}
