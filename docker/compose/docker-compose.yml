  ### 4.File server
  # Not built by this fork's CI (no source/Dockerfile in this repo) - pulled from
  # the upstream MyTelegram registry.
  file-server:
    image: ${MyTelegramRegistry}/mytelegram-file-server:${MyTelegramVersion}
    user: "1654"
    entrypoint: ["/app/MyTelegram.FileServer"]
    restart: always
    networks:
      - tg-net
    volumes:
      - ./data/mytelegram/file/uploads:/app/uploads
      - ./data/mytelegram/file:/app/Logs
    environment:
      Serilog__MinimumLevel__Default: ${Serilog__MinimumLevel__Default}
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      App__DatabaseName: ${App__DatabaseName}
      App__ReadModelDatabaseName: ${App__ReadModelDatabaseName}
      App__AccessHashSecretKey: ${App__AccessHashSecretKey}
      # App__ThisDcId: ${App__ThisDcId}
      # App__MediaDcId: ${App__MediaDcId}
      # App__UploadRootPath: ${App__UploadRootPath}
      # Route file-server through the 416-neutralising proxy (see minio-proxy service)
      # to work around the NullReferenceException bug in its bundled MinIO SDK.
      Minio__Endpoint: ${Minio__FileServerEndpoint:-minio-proxy:9000}
      Minio__AccessKey: ${Minio__AccessKey}
      Minio__SecretKey: ${Minio__SecretKey}
      Minio__BucketName: ${Minio__BucketName:-tg-files}
      Minio__CreateBucketIfNotExists: ${Minio__CreateBucketIfNotExists:-True}
      RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName:-rabbitmq}
      RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port:-5672}
      RabbitMQ__Connections__Default__UserName: ${RabbitMQ__Connections__Default__UserName:-test}
      RabbitMQ__Connections__Default__Password: ${RabbitMQ__Connections__Default__Password}
      RabbitMQ__EventBus__ClientName: MyTelegramFileServerRaw
      RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
      Redis__Configuration: ${Redis__Configuration}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-proxy:
        condition: service_started

  ### 5.Messenger command server
  messenger-command-server:
    image: ${TestgramRegistry}/mytelegram-messenger-command-server:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      call-init:
        condition: service_completed_successfully
      business-init:
        condition: service_completed_successfully
      botfather-init:
        condition: service_completed_successfully
    environment:
      Serilog__MinimumLevel__Default: ${Serilog__MinimumLevel__Default}
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      App__Brand: ${App__Brand:-Testgram}
      App__WelcomeMsg: ${App__WelcomeMsg:-Welcome to Testgram! Your account has been created.}
      App__DatabaseName: ${App__DatabaseName}
      App__ReadModelDatabaseName: ${App__ReadModelDatabaseName}
      App__AccessHashSecretKey: ${App__AccessHashSecretKey}
      App__FileServerGrpcServiceUrl: ${App__FileServerGrpcServiceUrl}
      App__FixedVerifyCode: ${App__FixedVerifyCode}
      App__VerificationCodeLength: ${App__VerificationCodeLength}
      App__VerificationCodeExpirationSeconds: ${App__VerificationCodeExpirationSeconds}
      App__CheckPhoneNumberFormat: ${App__CheckPhoneNumberFormat}
      App__EnableSearchNonContacts: ${App__EnableSearchNonContacts}
      App__SendWelcomeMessageAfterUserSignIn: ${App__SendWelcomeMessageAfterUserSignIn:-False}
      App__ProtectedUsernames__0: ${App__ProtectedUsernames__0:-admin}
      App__ProtectedUsernames__1: ${App__ProtectedUsernames__1:-botfather}
      App__ProtectedUsernames__2: ${App__ProtectedUsernames__2:-support}
      App__ProtectedUsernames__3: ${App__ProtectedUsernames__3:-telegram}
      App__EncryptionConfig__Enabled: ${App__EncryptionConfig__Enabled}
      App__EncryptionConfig__MessageKeys__0__Id: ${App__EncryptionConfig__MessageKeys__0__Id}
      App__EncryptionConfig__MessageKeys__0__Key: ${App__EncryptionConfig__MessageKeys__0__Key}
      App__EncryptionConfig__IndexKeys__0__Id: ${App__EncryptionConfig__IndexKeys__0__Id}
      App__EncryptionConfig__IndexKeys__0__Key: ${App__EncryptionConfig__IndexKeys__0__Key}
      # App__JoinChatDomain: ${App__JoinChatDomain}
      # App__ChannelGetDifferenceIntervalSeconds: ${App__ChannelGetDifferenceIntervalSeconds}
      # App__UseInMemoryFilters: ${App__UseInMemoryFilters}
      # App__IsMediaDc: ${App__IsMediaDc}
      # App__AutoCreateSuperGroup: ${App__AutoCreateSuperGroup}
      # App__EnableFutureAuthToken: ${App__EnableFutureAuthToken}
      # App__SetPremiumToTrueAfterUserCreated: ${App__SetPremiumToTrueAfterUserCreated}
      # App__SendWelcomeMessageAfterUserSignIn: ${App__SendWelcomeMessageAfterUserSignIn}
      App__WebRtcConnections__0__Ip: ${App__WebRtcConnections__0__Ip}
      App__WebRtcConnections__0__Port: ${App__WebRtcConnections__0__Port}
      App__WebRtcConnections__0__Turn: ${App__WebRtcConnections__0__Turn}
      App__WebRtcConnections__0__Stun: ${App__WebRtcConnections__0__Stun}
      App__WebRtcConnections__0__UserName: ${App__WebRtcConnections__0__UserName}
      App__WebRtcConnections__0__Password: ${App__WebRtcConnections__0__Password}
      App__RtmpStreamUrl: ${App__RtmpStreamUrl}
      App__RtmpHlsUrl: ${App__RtmpHlsUrl}
      App__PasskeyRpId: ${App__PasskeyRpId}
      App__PasskeyRpName: ${App__PasskeyRpName}
      App__Stripe__PublishableKey: ${App__Stripe__PublishableKey}
      App__Stripe__SecretKey: ${App__Stripe__SecretKey}
      EmailSenderOptions__Enabled: ${EmailSenderOptions__Enabled}
      EmailSenderOptions__FromAddress: ${EmailSenderOptions__FromAddress}
      EmailSenderOptions__FromDisplayName: ${EmailSenderOptions__FromDisplayName}
      EmailSenderOptions__SmtpEmailOptions__Host: ${EmailSenderOptions__SmtpEmailOptions__Host}
      EmailSenderOptions__SmtpEmailOptions__Port: ${EmailSenderOptions__SmtpEmailOptions__Port}
      EmailSenderOptions__SmtpEmailOptions__UserName: ${EmailSenderOptions__SmtpEmailOptions__UserName}
      EmailSenderOptions__SmtpEmailOptions__Password: ${EmailSenderOptions__SmtpEmailOptions__Password}
      EmailSenderOptions__SmtpEmailOptions__EnableSsl: ${EmailSenderOptions__SmtpEmailOptions__EnableSsl}
      # App__ThisDcId: ${App__ThisDcId}
      # Full datacenter list (see messenger-query-server for the rationale): DC1-5 must all
      # resolve to THIS server so clients never fall back to a built-in foreign DC address.
      # Ports must be live TCP MTProto listeners (20543/20643/20644).
      App__DcOptions__0__Enabled: "True"
      App__DcOptions__0__Id: "1"
      App__DcOptions__0__IpAddress: ${App__DcOptions__0__IpAddress}
      App__DcOptions__0__Port: "20543"
      App__DcOptions__0__MediaOnly: "False"

      App__DcOptions__1__Enabled: "True"
      App__DcOptions__1__Id: "2"
      App__DcOptions__1__IpAddress: ${App__DcOptions__1__IpAddress}
      App__DcOptions__1__Port: "20644"
      App__DcOptions__1__MediaOnly: "False"

      App__DcOptions__2__Enabled: "True"
      App__DcOptions__2__Id: "3"
      App__DcOptions__2__IpAddress: ${App__DcOptions__2__IpAddress}
      App__DcOptions__2__Port: "20643"
      App__DcOptions__2__MediaOnly: "False"

      App__DcOptions__3__Enabled: "True"
      App__DcOptions__3__Id: "4"
      App__DcOptions__3__IpAddress: ${App__DcOptions__3__IpAddress}
      App__DcOptions__3__Port: "20644"
      App__DcOptions__3__MediaOnly: "False"

      App__DcOptions__4__Enabled: "True"
      App__DcOptions__4__Id: "5"
      App__DcOptions__4__IpAddress: ${App__DcOptions__0__IpAddress}
      App__DcOptions__4__Port: "20543"
      App__DcOptions__4__MediaOnly: "False"
      RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName:-rabbitmq}
      RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port:-5672}
      RabbitMQ__Connections__Default__UserName: ${RabbitMQ__Connections__Default__UserName:-test}
      RabbitMQ__Connections__Default__Password: ${RabbitMQ__Connections__Default__Password}
      RabbitMQ__EventBus__ClientName: MyTelegramMessengerCommandServer
      RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
      Redis__Configuration: ${Redis__Configuration}
    volumes:
      - ./data/mytelegram/command-server/logs:/app/Logs

  ### 6.Messenger query server
  messenger-query-server:
    image: ${TestgramRegistry}/mytelegram-messenger-query-server:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    environment:
      Serilog__MinimumLevel__Default: ${Serilog__MinimumLevel__Default}
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      App__Brand: ${App__Brand:-Testgram}
      App__DatabaseName: ${App__DatabaseName}
      App__ReadModelDatabaseName: ${App__ReadModelDatabaseName}
      App__AccessHashSecretKey: ${App__AccessHashSecretKey}
      App__FileServerGrpcServiceUrl: ${App__FileServerGrpcServiceUrl}
      App__FixedVerifyCode: ${App__FixedVerifyCode}
      App__VerificationCodeLength: ${App__VerificationCodeLength}
      App__VerificationCodeExpirationSeconds: ${App__VerificationCodeExpirationSeconds}
      App__EnableSearchNonContacts: ${App__EnableSearchNonContacts}
      App__ProtectedUsernames__0: ${App__ProtectedUsernames__0:-admin}
      App__ProtectedUsernames__1: ${App__ProtectedUsernames__1:-botfather}
      App__ProtectedUsernames__2: ${App__ProtectedUsernames__2:-support}
      App__ProtectedUsernames__3: ${App__ProtectedUsernames__3:-telegram}
      App__EncryptionConfig__Enabled: ${App__EncryptionConfig__Enabled}
      App__EncryptionConfig__MessageKeys__0__Id: ${App__EncryptionConfig__MessageKeys__0__Id}
      App__EncryptionConfig__MessageKeys__0__Key: ${App__EncryptionConfig__MessageKeys__0__Key}
      App__EncryptionConfig__IndexKeys__0__Id: ${App__EncryptionConfig__IndexKeys__0__Id}
      App__EncryptionConfig__IndexKeys__0__Key: ${App__EncryptionConfig__IndexKeys__0__Key}
      # App__JoinChatDomain: ${App__JoinChatDomain}
      # App__ChannelGetDifferenceIntervalSeconds: ${App__ChannelGetDifferenceIntervalSeconds}
      # App__UseInMemoryFilters: ${App__UseInMemoryFilters}
      # App__IsMediaDc: ${App__IsMediaDc}
      # App__AutoCreateSuperGroup: ${App__AutoCreateSuperGroup}
      # App__EnableFutureAuthToken: ${App__EnableFutureAuthToken}
      # App__SetPremiumToTrueAfterUserCreated: ${App__SetPremiumToTrueAfterUserCreated}
      # App__SendWelcomeMessageAfterUserSignIn: ${App__SendWelcomeMessageAfterUserSignIn}
      App__WebRtcConnections__0__Ip: ${App__WebRtcConnections__0__Ip}
      App__WebRtcConnections__0__Port: ${App__WebRtcConnections__0__Port}
      App__WebRtcConnections__0__Turn: ${App__WebRtcConnections__0__Turn}
      App__WebRtcConnections__0__Stun: ${App__WebRtcConnections__0__Stun}
      App__WebRtcConnections__0__UserName: ${App__WebRtcConnections__0__UserName}
      App__WebRtcConnections__0__Password: ${App__WebRtcConnections__0__Password}
      App__RtmpStreamUrl: ${App__RtmpStreamUrl}
      App__RtmpHlsUrl: ${App__RtmpHlsUrl}
      App__PasskeyRpId: ${App__PasskeyRpId}
      App__PasskeyRpName: ${App__PasskeyRpName}
      App__Stripe__PublishableKey: ${App__Stripe__PublishableKey}
      App__Stripe__SecretKey: ${App__Stripe__SecretKey}
      EmailSenderOptions__Enabled: ${EmailSenderOptions__Enabled}
      EmailSenderOptions__FromAddress: ${EmailSenderOptions__FromAddress}
      EmailSenderOptions__FromDisplayName: ${EmailSenderOptions__FromDisplayName}
      EmailSenderOptions__SmtpEmailOptions__Host: ${EmailSenderOptions__SmtpEmailOptions__Host}
      EmailSenderOptions__SmtpEmailOptions__Port: ${EmailSenderOptions__SmtpEmailOptions__Port}
      EmailSenderOptions__SmtpEmailOptions__UserName: ${EmailSenderOptions__SmtpEmailOptions__UserName}
      EmailSenderOptions__SmtpEmailOptions__Password: ${EmailSenderOptions__SmtpEmailOptions__Password}
      EmailSenderOptions__SmtpEmailOptions__EnableSsl: ${EmailSenderOptions__SmtpEmailOptions__EnableSsl}
      # App__ThisDcId: ${App__ThisDcId}
      # Full datacenter list advertised to clients via help.getConfig. Every DC the official
      # client knows about (1-5) MUST be listed here and point at THIS server, otherwise the
      # client falls back to its built-in (foreign) address for any missing DC - e.g. DC4 ->
      # 194.221.250.50 - whose RSA key it doesn't have ("could not choose public RSA key").
      # Ports must be live TCP MTProto listeners on the gateway (20543/20643/20644);
      # 20443 is not listened and 30443/30444 are HTTPS (web) endpoints.
      App__DcOptions__0__Enabled: "True"
      App__DcOptions__0__Id: "1"
      App__DcOptions__0__IpAddress: ${App__DcOptions__0__IpAddress}
      App__DcOptions__0__Port: "20543"
      App__DcOptions__0__MediaOnly: "False"

      App__DcOptions__1__Enabled: "True"
      App__DcOptions__1__Id: "2"
      App__DcOptions__1__IpAddress: ${App__DcOptions__1__IpAddress}
      App__DcOptions__1__Port: "20644"
      App__DcOptions__1__MediaOnly: "False"

      App__DcOptions__2__Enabled: "True"
      App__DcOptions__2__Id: "3"
      App__DcOptions__2__IpAddress: ${App__DcOptions__2__IpAddress}
      App__DcOptions__2__Port: "20643"
      App__DcOptions__2__MediaOnly: "False"

      App__DcOptions__3__Enabled: "True"
      App__DcOptions__3__Id: "4"
      App__DcOptions__3__IpAddress: ${App__DcOptions__3__IpAddress}
      App__DcOptions__3__Port: "20644"
      App__DcOptions__3__MediaOnly: "False"

      App__DcOptions__4__Enabled: "True"
      App__DcOptions__4__Id: "5"
      App__DcOptions__4__IpAddress: ${App__DcOptions__0__IpAddress}
      App__DcOptions__4__Port: "20543"
      App__DcOptions__4__MediaOnly: "False"
      RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName:-rabbitmq}
      RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port:-5672}
      RabbitMQ__Connections__Default__UserName: ${RabbitMQ__Connections__Default__UserName:-test}
      RabbitMQ__Connections__Default__Password: ${RabbitMQ__Connections__Default__Password}
      RabbitMQ__EventBus__ClientName: MyTelegramMessengerQueryServer
      RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
      Redis__Configuration: ${Redis__Configuration}
      MYTELEGRAM_GEOIP_COUNTRY_DB: ${MYTELEGRAM_GEOIP_COUNTRY_DB:-/geoip/GeoLite2-City.mmdb}
    volumes:
      - ./data/mytelegram/query-server/logs:/app/Logs
      - ./update.json:/app/update.json:ro
      - ./geoip:/geoip:ro
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  ### 7.Sms sender
  sms-sender:
    image: ${TestgramRegistry}/mytelegram-sms-sender:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    environment:
      Serilog__MinimumLevel__Default: ${Serilog__MinimumLevel__Default}
      App__Brand: ${App__Brand:-Testgram}
      TwilioSms__Enabled: ${TwilioSms__Enabled}
      TwilioSms__AccountSId: ${TwilioSms__AccountSId}
      TwilioSms__AuthToken: ${TwilioSms__AuthToken}
      TwilioSms__FromNumber: ${TwilioSms__FromNumber}
      TwilioSms__MessagingServiceSId: ${TwilioSms__MessagingServiceSId}
      # VonageSms__Enabled: ${VonageSms__Enabled}
      # VonageSms__BrandName: ${VonageSms__BrandName}
      # VonageSms__ApiKey: ${VonageSms__ApiKey}
      # VonageSms__ApiSecret: ${VonageSms__ApiSecret}
      RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName:-rabbitmq}
      RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port:-5672}
      RabbitMQ__Connections__Default__UserName: ${RabbitMQ__Connections__Default__UserName:-test}
      RabbitMQ__Connections__Default__Password: ${RabbitMQ__Connections__Default__Password}
      #RabbitMQ__EventBus__ClientName: ${RabbitMQ__EventBus__ClientName}
      RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
      TelegramBotSms__Enabled: ${TelegramBotSms__Enabled:-true}
      TelegramBotSms__SenderApiUrl: http://bot:5005/send
    volumes:
      - ./data/mytelegram/sms-sender/logs:/app/Logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      # Bot is optional (compose profile "bot"). sms-sender must start even when the
      # verification bot is disabled (fixed login code mode).

  ### 8.Verification bot (delivers login codes to Telegram accounts that linked a phone number)
  bot:
    profiles:
      - bot
    image: ${TestgramRegistry}/testgram-bot:${TestgramVersion}
    restart: always
    networks:
      - tg-net
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_TOKEN1: ${BOT_TOKEN1:-}
      BOT_TOKEN2: ${BOT_TOKEN2:-}
      PROXY_URL: ${PROXY_URL:-}
      DB_PATH: /data/codes.db
      ENABLE_RABBITMQ_CONSUMER: ${ENABLE_RABBITMQ_CONSUMER:-false}
      RABBITMQ_URL: amqp://${RabbitMQ__Connections__Default__UserName:-test}:${RabbitMQ__Connections__Default__Password}@rabbitmq/
    volumes:
      - ./data/bot:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 5005), 2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      rabbitmq:
        condition: service_healthy

  ### FamilyGram Web (telegram-tt SPA + nginx, proxies /apiws to gateway-server)
  familygram-web:
    profiles:
      - web
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        TELEGRAM_API_ID: ${TELEGRAM_API_ID}
        TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
        PRODUCTION_HOSTNAME: ${WEB_DOMAIN}
        BASE_URL: ${WEB_BASE_URL}
        APP_NAME: ${WEB_APP_NAME:-FamilyGram Web}
        APP_TITLE: ${WEB_APP_TITLE:-FamilyGram}
    image: ${FamilygramWebImage:-familygram/familygram-web:local}
    restart: always
    networks:
      - tg-net
    ports:
      - "${WEB_HOST_PORT:-8082}:${WEB_CONTAINER_PORT:-8082}"
    environment:
      GATEWAY_UPSTREAM: gateway-server:${App__Servers__5__Port:-30444}
      LISTEN_PORT: ${WEB_CONTAINER_PORT:-8082}
    depends_on:
      gateway-server:
        condition: service_started
